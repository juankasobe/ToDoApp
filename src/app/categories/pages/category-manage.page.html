<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Categories</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Name</ion-label>
    <ion-input [(ngModel)]="name" placeholder="Category name"></ion-input>
  </ion-item>

  <ion-note color="danger" *ngIf="errorMessage">{{ errorMessage }}</ion-note>
  <ion-button expand="block" (click)="createCategory()">Save Category</ion-button>

  <ion-list>
    <ion-list-header>Categories</ion-list-header>
    <ion-item-sliding *ngFor="let category of categories">
      <ion-item>
        <ion-label>{{ category.name }}</ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteCategory(category.id)">Delete</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
