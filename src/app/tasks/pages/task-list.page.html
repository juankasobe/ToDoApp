<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/tasks/new">New</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card color="warning" *ngIf="errorMessage">
    <ion-card-content>
      <p>{{ errorMessage }}</p>
      <ion-button fill="clear" (click)="loadTasks()">Retry</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list *ngIf="tasks.length; else emptyState">
    <ion-item-sliding *ngFor="let task of tasks">
      <ion-item>
        <ion-checkbox slot="start" [checked]="task.completed" (ionChange)="toggleTask(task)"></ion-checkbox>
        <ion-label>
          <h2 [class.completed]="task.completed">{{ task.title }}</h2>
          <p *ngIf="task.categoryId">Category: {{ getCategoryName(task.categoryId) }}</p>
          <p *ngIf="!task.categoryId">Uncategorized</p>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="deleteTask(task)">Delete</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ng-template #emptyState>
    <ion-card>
      <ion-card-header>
        <ion-card-title>No tasks yet</ion-card-title>
      </ion-card-header>
      <ion-card-content>Create a local task to see it here.</ion-card-content>
    </ion-card>
  </ng-template>
</ion-content>
